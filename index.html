<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ballz Breaker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <header class="hud">
      <div>
        <p class="eyebrow">Brick Breaker</p>
        <h1>Ballz Breaker</h1>
      </div>
      <div class="scoreboard">
        <div class="stat">
          <span class="label">Round</span>
          <strong id="roundValue">1</strong>
        </div>
        <div class="stat">
          <span class="label">Score</span>
          <strong id="scoreValue">0</strong>
        </div>
        <div class="stat">
          <span class="label">Balls</span>
          <strong id="ballCountValue">1</strong>
        </div>
      </div>
    </header>

    <section class="game-panel">
      <canvas id="gameCanvas" width="540" height="860" aria-label="Ballz style brick breaker game"></canvas>
      <div class="overlay" id="startOverlay">
        <div class="overlay-card">
          <h2>Pull, aim, release</h2>
          <p>Clear bricks before they reach the bottom. Catch bonus balls to grow your volley.</p>
          <button id="startButton" type="button">Start Game</button>
        </div>
      </div>
      <div class="overlay hidden" id="gameOverOverlay">
        <div class="overlay-card">
          <h2>Round Over</h2>
          <p id="gameOverText">You made it to round 1.</p>
          <button id="restartButton" type="button">Play Again</button>
        </div>
      </div>
    </section>

    <section class="instructions">
      <p>Drag or swipe anywhere on the board to aim. Release to fire your full stack of balls.</p>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
